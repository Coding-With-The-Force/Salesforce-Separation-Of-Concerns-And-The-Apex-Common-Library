site_name: "The Complete Guide to the Apex Common Library"
site_description: "A comprehensive guide to implementing Separation of Concerns in Salesforce using the Apex Common Library."
site_url: "https://coding-with-the-force.github.io/Salesforce-Separation-Of-Concerns-And-The-Apex-Common-Library/"
repo_url: "https://github.com/Coding-With-The-Force/Salesforce-Separation-Of-Concerns-And-The-Apex-Common-Library"
repo_name: "Coding-With-The-Force/Apex-Common-Library-Wiki"
edit_uri: ""

docs_dir: docs

theme:
  name: material
  palette:
    # Dark mode (default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    # Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    
extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - tables
  - fenced_code
  - codehilite
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Coding-With-The-Force/Salesforce-Separation-Of-Concerns-And-The-Apex-Common-Library
      name: View on GitHub
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@CodingWithTheForce
      name: YouTube Channel

copyright: "Made with 🦖 by <a href='https://github.com/Coding-With-The-Force'>Coding With The Force</a> &nbsp;|&nbsp; <a href='https://www.paypal.com/donate?business=RNHEF8ZWKKLDG&currency_code=USD'>Buy me some Taco Bell? 🌮</a>"

